name: kultur-dev
description: >-
  The multimodal cultural intelligence layer every AI agent needs. Analyze text, images, and video
  for cultural risks, sensitivity, and localization across 200+ markets. 9 MCP tools + image/video
  analysis + branded PDF report generation. 15 tone styles, Hofstede dimensions, geopolitical risk
  scoring. The cost of a cultural mistake is millions. The cost of preventing one is an API call.
version: 1.0.2
author: Global InTech AI
homepage: https://kultur.dev
repository: https://github.com/kultur-dev/mcp-server
license: MIT
categories:
  - data
  - analysis
  - enterprise
  - localization
  - multimodal
tags:
  - cultural-intelligence
  - localization
  - hofstede
  - geopolitical-risk
  - sensitivity-checking
  - mcp
  - ai-agents
  - multimodal
  - image-analysis
  - video-analysis
  - pdf-reports
  - global-markets
  - brand-safety
  - compliance
transport:
  type: sse
  url: https://kultur.dev/api/mcp-sse/sse
  headers:
    Authorization: "Bearer ${KULTUR_API_KEY}"
tools:
  - analyze_cultural_context
  - check_cultural_sensitivity
  - get_localization_guidance
  - compare_cultures
  - get_communication_style
  - get_holiday_calendar
  - analyze_hofstede
  - compare_hofstede
  - get_geopolitical_heatmap
